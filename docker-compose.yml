services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: hover
      POSTGRES_USER: hover
      POSTGRES_PASSWORD: hover
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hover -d hover"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/hover || true;
      exit 0;
      "

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./backend:/app
      - extracted_data:/app/extracted
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      USE_SQLITE: "false"
      USE_LOCAL_STORAGE: "false"
      WORKER_EAGER: "false"
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      AWS_S3_ENDPOINT_URL: http://minio:9000
      MEDIA_ROOT: /app/media
      EXTRACT_ROOT: /app/extracted
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.worker"]
    volumes:
      - ./backend:/app
      - extracted_data:/app/extracted
      - media_data:/app/media
    env_file:
      - .env
    environment:
      USE_SQLITE: "false"
      USE_LOCAL_STORAGE: "false"
      WORKER_EAGER: "false"
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      AWS_S3_ENDPOINT_URL: http://minio:9000
      MEDIA_ROOT: /app/media
      EXTRACT_ROOT: /app/extracted
      PYTHONPATH: /app
    depends_on:
      - web
      - redis
      - postgres

volumes:
  postgres_data:
  minio_data:
  extracted_data:
  media_data:
